name: Bug 报告
description: 报告可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App 版本或提交
  - type: input
    id: device
    attributes:
      label: Android 版本与设备型号
  - type: textarea
    id: logs
    attributes:
      label: 已脱敏日志
      description: 删除令牌、账号、备注、真实活动记录和其他隐私后再粘贴。
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私检查
      options:
        - label: 我已确认内容不包含真实私人记录、密钥或访问令牌
          required: true

