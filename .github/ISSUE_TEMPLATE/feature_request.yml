name: 功能建议
description: 提议一个新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述用户场景，不要包含真实私人记录。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为和交互。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
  - type: checkboxes
    id: scope
    attributes:
      label: 提交检查
      options:
        - label: 我没有提交真实用户数据、账号信息或密钥
          required: true
        - label: 我已检查路线图和现有 Issue
          required: true

